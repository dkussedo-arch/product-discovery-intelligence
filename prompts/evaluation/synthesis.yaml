- description: Enterprise onboarding churn — should surface SSO friction and contradict integration assumption
  vars:
    query: What do we know about why enterprise customers churn in the first 90 days?
    citationIds: '1, 2, 3, 4, 5'
    context: |
      Source [1] - Enterprise onboarding churn — Q1 interview synthesis
      We interviewed 12 enterprise admins in January. Teams stall in the first 14 days when SSO setup fails or requires IT approval loops. Three of five churned accounts cited onboarding friction as the primary cancellation reason — not missing features.

      Source [2] - Assumption: Enterprise churn is driven by missing integrations
      We believe enterprise customers churn because we lack native Salesforce and Jira integrations. Evidence: 4 exit interviews mentioned integrations. Status: Active.

      Source [3] - Productboard feedback cluster — onboarding complaints
      47 feedback items tagged onboarding. Top themes: SSO configuration (18), invite workflow confusion (11). Integration requests appear in only 6 items — lower volume than onboarding friction.

      Source [4] - Decision record — Q1 roadmap prioritization
      Decision: Prioritize Salesforce connector for Q1 over onboarding improvements. Dissent: Research lead noted onboarding research from January was not consulted.

      Source [5] - Slack #product-discovery — onboarding vs integrations debate
      Research lead flagged that Q1 Dovetail synthesis showed onboarding as primary churn driver, but roadmap decision prioritized integrations.
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = JSON.stringify(parsed).toLowerCase();
        const mentionsOnboarding = text.includes('onboarding') || text.includes('sso');
        return {
          pass: mentionsOnboarding,
          score: mentionsOnboarding ? 1 : 0,
          reason: mentionsOnboarding
            ? 'Response addresses onboarding/SSO evidence'
            : 'Expected onboarding or SSO to appear in synthesis',
        };
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const hasConflict =
          Array.isArray(parsed.conflicts) && parsed.conflicts.length > 0;
        return {
          pass: hasConflict,
          score: hasConflict ? 1 : 0,
          reason: hasConflict
            ? 'Conflicts between research and roadmap surfaced'
            : 'Expected explicit conflict between onboarding research and integration assumption',
        };

- description: Roadmap assumptions — should cite assumption register and note dissent
  vars:
    query: What assumptions are driving our Q1 roadmap?
    citationIds: '2, 4, 5'
    context: |
      Source [2] - Assumption: Enterprise churn is driven by missing integrations
      We believe enterprise customers churn because we lack native Salesforce and Jira integrations. Status: Active. Owner: Sarah Chen.

      Source [4] - Decision record — Q1 roadmap prioritization
      Decision: Prioritize Salesforce connector for Q1 over onboarding improvements. Rationale: largest deal in pipeline requested Salesforce. Assumption linked: enterprise churn driven by integrations.

      Source [5] - Slack #product-discovery
      PM responded that pipeline deal outweighs research signal. Action item: reconcile assumption register with latest interview data.
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        const text = JSON.stringify(parsed).toLowerCase();
        const mentionsAssumption =
          text.includes('integration') || text.includes('assumption');
        return {
          pass: mentionsAssumption,
          score: mentionsAssumption ? 1 : 0,
          reason: mentionsAssumption
            ? 'Response references roadmap assumptions'
            : 'Expected integration assumption to be surfaced',
        };
