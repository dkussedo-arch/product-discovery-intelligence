# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: PDI synthesis summary accuracy — baseline vs chain-of-thought

prompts:
  - id: file://synthesis-baseline-prompt.yaml
    label: baseline
  - id: file://synthesis-cot-prompt.yaml
    label: cot

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 4096
      temperature: 0.2

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        if (!parsed.overview || typeof parsed.overview !== 'string') {
          return { pass: false, score: 0, reason: 'Missing overview' };
        }
        if (!Array.isArray(parsed.claims) || parsed.claims.length === 0) {
          return { pass: false, score: 0, reason: 'No claims returned' };
        }
        const cited = parsed.claims.every(
          (c) => Array.isArray(c.citationIds) && c.citationIds.length > 0
        );
        return {
          pass: cited,
          score: cited ? 1 : 0.5,
          reason: cited ? 'All claims cite sources' : 'Some claims lack citations',
        };

tests: file://synthesis.yaml
